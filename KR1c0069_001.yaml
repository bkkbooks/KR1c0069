body:
  text: 毛詩國風周南所以風天下風福鳳反陸德明釋文風風也上如字下福鳳反窈窕淑女箋不嫉妒嫉音自後皆同我馬虺隤虺呼懷反隤徒懷反蟄蟄兮蟄直立反南有喬木喬紀橋反伐其條肄以世反並同上召南蔽芾甘棠蔽方四反芾方蓋反釋文必至切小貌丁度集韻去聲六至蔽字注召伯所茇扶蓋反釋文召伯所憩許罽反釋文集韻去聲十三祭憩字注何以速我訟才容反釋文素絲五緎音域羔羊之縫箋言縫殺之大小殺所例反並同上摽有梅摽符表反釋文被表切落也集韻上聲三十小摽字注維參與昴音茅釋文抱衾與裯鄭音直俱反一發五豝發音廢傳豕牝曰豝牝扶忍反一發五豵在客反並同上邶不可以茹如庶反釋文受侮不少侮音茂釋文莫候切傷也集韻去聲五十候侮字注泣涕如雨涕音弟釋文以勗寡人勗沉目反寧不我顧音古終風且霾莫戒反並同上旭曰始旦旭許袁反釋文日始出大昕時集韻上平聲二十二元旭字注采葑采菲葑音豐釋文敷馮切集韻上平聲一東葑字注亦以御冬傳御禦也禦魚舉反釋文既詒我肄以自反狐裘蒙戎蒙武邦反戎如容也蒙戎亂貌飲餞于禰餞才箭反送行飲酒也自牧歸荑牧音目新臺有沘七禮反鮮明貌河水瀰瀰莫啓反水盛也並同上燕婉之求婉於管反釋文塢管切順也集韻上聲二十四緩婉字注鄘揚且之晳也且子餘反下同釋文命彼倌人倌古患反騋牝三千牝扶忍反我思不閟方冀反芃芃其麥芃符雄反並同上衛充耳琇瑩音營釋文衣錦褧衣褧孔穎反領如蝤蠐蝤音曹螓首蛾眉螓子盈反美目盼兮盼膚諫反河水洋洋音祥葭菼揭揭起謁反庶姜孽孽五謁反庶士有朅起謁反並同上其葉沃若沃於縛反釋文茂貌集韻入聲十八藥沃字注檜楫松舟楫音集釋文能不我甲胡甲反釋文音狎顏師匡謬正俗卷一報之以瓊琚音渠釋文王暵其乾矣暵音漢釋文有女仳離仳符鄙反大車啍啍徒孫反並同上鄭洵直且侯洵音荀釋文摻執子之袪兮摻所軌反山有扶蘇音疏青青子襟音琴人實迋女迋居望反並同上出其闉闍止奢反釋文之奢切集韻下平聲九麻闍字注零露瀼瀼乃剛反釋文奴當切集韻下平聲十一唐瀼𩆶字注士曰既且子胥反釋文齊魯道有蕩勑黨反釋文坦朗切平易也集韻上聲二十七蕩蕩字注衡從其畝衡音橫匡謬正俗卷一維莠桀桀居謁反釋文敝笱刺文姜也敝符滅反釋文蒲結切敗也集韻入聲十六屑敝字注載驅薄薄扶各反釋文魏其民機巧趨利巧古孝反趨七喻反釋文摻摻女手摻息廉反同上有縣貆兮貆音暄貉子也釋文引徐郭三歲貫女貫音官釋文唐無已大康大勑佐反下同釋文集于苞栩傳栩杼也杼治與反同上有杕之杜杕徒計反顏氏家訓書證篇蘞蔓于野蘞力劍反釋文秦陰靷鋈續辭屬反釋文辭屢切連也集韻去聲十遇續字注龍盾之合盾音允釋文竹閉緄縢閉邊惠反殲我良人殲息廉反百夫之防毛音方鄭音房子車針虎針音針並同上陳穀且于差且子餘反差七何反釋文歌以訊之訊息悴反告也同上曹不濡其咮都豆反釋文浸彼苞稂音良同上豳猗彼女桑猗於宜反釋文六月莎雞振羽莎素和反穹窒熏鼠窒得悉反並同上鬻子之閔斯鬻居六反釋文集韻入聲一屋鬻字注逮天之未陰雨逮勑改反釋文又缺我銶音虯同上小雅載驟駸駸驟在遘反顏氏家訓音辭篇釃酒有藇釃所宜反又所餘反釋文於粲酒掃酒所寄反樂與賢也樂五教反序文同蒸然罩罩都學反零露瀼瀼乃剛反鞗革沖沖音同又敕弓反並同上共武之服共音恭釋文引王徐玁狁匪茹音如釋文采芑宣王南征也芑求己反八鸞瑲瑲七羹反戎車嘽嘽音宅如霆如雷霆音挺又音定四牡龐龐扶公反儦儦俟俟音矣鴻雁序至于矜寡矜古頑反又棘冰反篇內矜寡同老無妻曰矜老無夫曰寡稽文顏師古匡謬正俗卷一引徐仙民云各頑反庭燎美宣王也燎力燒反並同上鸞聲噦噦呼惠反釋文集韻去聲十二霽噦字注沔水規宣王也沔莫顯反釋文縶之維之縶下立反賁然來思賁音奔勉思遁思遁徒損反蔽芾其樗蔽方四反下莞上簟莞九完反草叢生水中莖圓江南以為席形似小蒲而實非也並同上或寢或訛牛河切動也集韻下平聲七歌訛字注維周之氐鄭音都履反釋文有倫有脊音積有菀其特菀於阮反天之扤我扤音月燎之方揚燎力燒反山冢崒崩崒子綏反宜依爾雅音子恤反釋文孔穎達正義引徐邈以為崒子綏反番維司徒番甫言反抑此皇甫抑音噫戎成不退音退莫肯用訊音悴又音碎或聖或否音鄙民雖靡膴鄭音模又音武不屬于毛屬音蜀萑葦淠淠孚計反又匹計反析薪扡矣扡直是反曰父母且七餘反昊天大憮大勑佐反亂是用餤音鹽並同上無拳無勇拳己袁反釋文力也集韻上平聲二十元拳字注亦已大甚大勑佐反釋文誰適與謀適都歷反下同釋文引王徐猗於畝丘猗於宜反釋文潸焉出涕出尺遂反佻佻公子佻徒了反契契寤歎契苦結反哀我憚人憚音但跂彼織女跂丘婢反不可以簸揚簸府佐反西柄之揭起謁反偕偕士子偕音諧並同上或不知叫號呼到反匡謬正俗卷一憚我不暇憚音但釋文憂心且妯直留反言抽其棘抽直留反徂賚孝孫賚音來神嗜飲食嗜巨之反下章同並同上享于祖考享許亮反注及下同釋文薦也集韻去聲四十一漾享字注黍稷薿薿魚力反釋文禾易長畝易以赤反同上以我覃耜覃以廉反釋文利也集韻下平聲二十四鹽覃字注以享以祀享許亮反釋文匡謬正俗卷一鞞琫有珌傳大夫鐐琫而鏐珌鐐盧到反又力弔反釋文引徐何藝其黃矣藝音運釋文六轡沃若沃於縛反同上君子樂胥思敘反釋文引鄭徐乘馬在廄乘繩證反四馬也釋文引王徐福祿艾之艾音刈釋文德音來括古闊反鮮我覯爾鮮音仙賓之初筵序上下沈湎莫顯反並同上獻爾發功發音廢釋文放𠯈切發矢也集韻去聲二十廢發字注各奏爾能奴代反又奴來反釋文舍其坐遷坐才臥反式勿從謂式毛如字用也鄭讀作慝他得反惡也無俾大怠大勑佐反俾出童羖出尺遂反並同上玄袞及黼音補釋文彼五切白黑文也集韻上聲十姥黼字注觱沸檻泉檻下斬反釋文其旗淠淠孚蓋反又芳計反釋文動也集韻去聲十四太淠字注如食宜飫於具反釋文雨雪瀌瀌符彪反又方苗反雪盛貌釋文皮虬切集韻下平聲二十幽瀌字注式居婁驕婁鄭音樓斂也釋文菀柳刺幽王也菀於阮反無自昵焉昵乃吉反不尚愒焉愒丘麗反充耳琇實琇音誘我心苑結苑音鬱又於阮反卬烘于煁烘音洪俾我疷兮疷都禮反又祁支反並同上苕之華苕音韶草名釋文時饒切集韻下平聲四宵苕芀字注大雅俔天之妹俔下顯反釋文救之陾陾救音鳩維其喙矣喙音尺鋭反蒸徒楫之楫音集以享以祀享許亮反王此大邦王于況反王在靈囿于目反虡業維樅七凶反又音衝衝牙也鼉鼓逢逢音豐王后維翰音寒瓜瓞唪唪薄孔反維秬維秠芳婢反並同上維穈維芑巨己反釋文白苗也集韻上聲六止芑字注敦弓既堅郭都雷反釋文酌以大斗音主黃耇台背台音臺鳧鷖在潀鄭音在容反水外之高者也並同上伴奐爾游矣伴音畔奐音換釋文伴奐有文章也集韻去聲二十九換奐字注正義云徐自為鄭讀也爾土宇昄章昄符版反釋文茀祿爾康矣茀鄭音廢一云毛方味反鄭芳沸反柔遠能邇柔毛如字鄭奴代反迄可小愒邱麗反無然泄泄以世反多將熇熇許酷反大宗維翰音寒曾是掊克掊甫垢反天不湎爾以酒湎莫顯反飲酒齊色曰湎無言不讎鄭市又反輯柔爾顏輯音集又七入反靡國不泯音民荓云不逮荓補耕反本或作拼同弗求弗迪徒歷反雲漢序百姓見憂於救反旱既大甚大他佐反下大甚並同蘊隆蟲蟲徒冬反如惔如焚惔音炎並同上炮鱉鮮魚炮甫九反釋文毛居正六經正誤卷三燕師所完燕鄭於顯反王肅孫育並烏賢反云北燕燕國淮夷來鋪音孚並同上釐爾圭瓚釐落蓋切集韻去聲十四太釐字注左右陳行陳直覲反釋文匪紹匪遊紹鄭人遙反徐方繹騷音蕭闕如虓虎闞火斬反又火敢反一音噉鋪敦淮濆鋪音孚陳也時維婦寺音侍亦如字觱沸檻泉檻下斬反並同上周頌假以溢我溢毛音諡釋文神至切慎也集韻去聲六至溢字注肇禋音煙同上因蓮切祀天也集韻下平聲一先禋字注維周之祺本又作禎音貞釋文岐有夷之行下孟反釋文引王徐傳夷易也易羊豉反下易曰皆同釋文成王不敢康王于況反我將我享許亮反並同上鐘鼓喤喤音皇又音宏注同釋文六經正誤卷三引下音來咨來茹音如釋文奄觀銍艾奄如字釋文引王徐豐年多黍多稌勑古反釋文六經正誤卷三亦有高廩力錦反又力荏反倉也釋文假哉皇考古雅反和鈴央央音英敦琢其旅敦音雕武奏大武也大音泰注同朕未有艾音刈徂隰徂畛音真並同上有椒其馨椒子料反釋文司馬光類篇卷六引作子肖切絲衣其紑孚不反又音培又音弗釋文鼐鼎及鼒音災酌告成大武也大音泰賚大封於廟也賚音來並同上魯頌駉序牧于坰野牧音目坰苦營反或苦瓊反遠也下同釋文有駵有駱傳云黑身白鬣曰駱今注疏本作雒正義云檢定本集注徐音皆作駱字釋文云雒音洛本或作駱駜彼乘駽火玄反又胡反又音炫釋文薄采其茆音柳屈此群醜屈鄭又其勿反戎車孔博毛如字王同大也鄭作傅音附稙稚菽麥稙時力反並同上敦商之旅敦都門反厚也釋文引王徐萬舞洋洋音翔釋文朱英緑縢英於耕反同上松桷有舄音託釋文鬱縛切大貌集韻入聲十九鐸舄字注商頌約軧錯衡錯采故反釋文幅𢄙既長𢄙于貧反昭假遲遲假毛音格鄭音暇為下國綴旒綴張衛反毛云表也鄭云結也二同不競不絿音虯並同上為下國駿厖鄭音武講反釋文母項切豐也厚也集韻上聲三講厖字注
